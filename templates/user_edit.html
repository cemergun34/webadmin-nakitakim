{% extends "base.html" %}
{% block title %}{{ user.kullanici_adi }} | NakitAkım WebAdmin{% endblock %}
{% block page_title %}Kullanıcı Düzenle{% endblock %}

{% block content %}
<div class="page-header-row">
  <a href="{{ url_for('users') }}" class="btn btn-ghost btn-sm back-btn">
    <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2"/></svg>
    Kullanıcılar
  </a>
  <h2 class="page-heading">{{ user.kullanici_adi }}</h2>
</div>

<div class="edit-grid">

  <!-- Temel Bilgiler -->
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">Temel Bilgiler</h3>
    </div>
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="action" value="update_info" />
        <div class="form-grid-2">
          <div class="form-group">
            <label>Kullanıcı Adı</label>
            <input type="text" name="kullanici_adi" value="{{ user.kullanici_adi }}" required />
          </div>
          <div class="form-group">
            <label>E-posta</label>
            <input type="email" name="eposta" value="{{ user.eposta or '' }}" />
          </div>
          <div class="form-group">
            <label>Firma Adı</label>
            <input type="text" name="firmaadi" value="{{ user.firmaadi or '' }}" />
          </div>
          <div class="form-group">
            <label>Vergi No</label>
            <input type="text" name="vergino" value="{{ user.vergino or '' }}" />
          </div>
          <div class="form-group">
            <label>İl</label>
            <input type="text" name="il" value="{{ user.il or '' }}" />
          </div>
          <div class="form-group">
            <label>İlçe</label>
            <input type="text" name="ilce" value="{{ user.ilce or '' }}" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary mt-3">Bilgileri Güncelle</button>
      </form>
    </div>
  </div>

  <!-- Yetki Yönetimi -->
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2"/></svg>
        Yetki Seviyesi
      </h3>
    </div>
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="action" value="update_yetki" />
        <div class="form-group">
          <label>Mevcut Yetki:
            <span class="badge
              {% if user.yetki == 'superadmin' %}badge-superadmin
              {% elif user.yetki == 'admin' %}badge-admin
              {% else %}badge-user{% endif %}">
              {{ user.yetki or '0' }}
            </span>
          </label>
          <select name="yetki" class="select-input">
            <option value="0" {% if not user.yetki or user.yetki == '0' %}selected{% endif %}>Kullanıcı (0)</option>
            <option value="admin" {% if user.yetki == 'admin' %}selected{% endif %}>Admin</option>
            <option value="superadmin" {% if user.yetki == 'superadmin' %}selected{% endif %}>Super Admin</option>
          </select>
        </div>
        <button type="submit" class="btn btn-indigo mt-2">Yetkiyi Güncelle</button>
      </form>
    </div>
  </div>

  <!-- Lisans Yönetimi -->
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/></svg>
        Lisans Yönetimi
      </h3>
    </div>
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="action" value="update_lisans" />
        <div class="form-group">
          <label>Paket Türü</label>
          <select name="paket_turu" class="select-input">
            <option value="" {% if not user.paket_turu %}selected{% endif %}>Seçiniz</option>
            <option value="Başlangıç" {% if user.paket_turu == 'Başlangıç' %}selected{% endif %}>Başlangıç</option>
            <option value="Profesyonel" {% if user.paket_turu == 'Profesyonel' %}selected{% endif %}>Profesyonel</option>
            <option value="Kurumsal" {% if user.paket_turu == 'Kurumsal' %}selected{% endif %}>Kurumsal</option>
            <option value="Sınırsız" {% if user.paket_turu == 'Sınırsız' %}selected{% endif %}>Sınırsız</option>
          </select>
        </div>
        <div class="form-group">
          <label>Lisans Bitiş Tarihi</label>
          <input type="date" name="son_odeme" value="{{ user.son_odeme or '' }}" />
        </div>
        <button type="submit" class="btn btn-green mt-2">Lisansı Güncelle</button>
      </form>
    </div>
  </div>

  <!-- Şifre Sıfırlama -->
  <div class="card card-danger-border">
    <div class="card-header">
      <h3 class="card-title text-danger">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2"/></svg>
        Şifre Sıfırla
      </h3>
    </div>
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="action" value="reset_password" />
        <div class="form-group">
          <label>Yeni Şifre</label>
          <input type="password" name="new_password" placeholder="En az 4 karakter" minlength="4" />
        </div>
        <button type="submit" class="btn btn-danger mt-2">Şifreyi Değiştir</button>
      </form>
    </div>
  </div>

</div>
{% endblock %}
